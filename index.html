<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>NeighborRent App</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
}

header {
  background: #2e7d32;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.screen {
  display: none;
  padding: 15px;
}

.active {
  display: block;
}

.card {
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
}

button {
  background: #2e7d32;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  margin-top: 8px;
  width: 100%;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  margin-bottom: 8px;
}

.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: white;
  border-top: 1px solid #ccc;
}

.nav button {
  flex: 1;
  background: none;
  color: black;
}
</style>

</head>

<body>

<header>NeighborRent</header>

<!-- HOME -->

<div id="home" class="screen active"></div>

<!-- POST -->

<div id="post" class="screen">
  <h3>Post an Item</h3>
  <input id="itemName" placeholder="Item name">
  <input id="itemPrice" placeholder="Price per day">
  <button onclick="addItem()">Post Item</button>
</div>

<!-- REQUESTS -->

<div id="requests" class="screen">
  <h3>Requests</h3>
  <div id="requestList"></div>
</div>

<!-- RENT SCREEN -->

<div id="rentScreen" class="screen"></div>

<!-- NAV -->

<div class="nav">
  <button onclick="showScreen('home')">Home</button>
  <button onclick="showScreen('post')">Post</button>
  <button onclick="showScreen('requests')">Requests</button>
</div>

<script>
let items = [
  {name:"Lawn Mower", price:8},
  {name:"Power Washer", price:10}
];

let requests = [];

function showScreen(screen) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(screen).classList.add("active");
  if(screen === "home") renderHome();
  if(screen === "requests") renderRequests();
}

function renderHome() {
  let html = "<h3>Available Items</h3>";
  items.forEach((item, i) => {
    html += `
      <div class="card">
        <h4>${item.name}</h4>
        <p>$${item.price}/day</p>
        <button onclick="openRent(${i})">Rent</button>
      </div>
    `;
  });
  document.getElementById("home").innerHTML = html;
}

function addItem() {
  let name = document.getElementById("itemName").value;
  let price = document.getElementById("itemPrice").value;

  if(name && price){
    items.push({name, price});
    document.getElementById("itemName").value = "";
    document.getElementById("itemPrice").value = "";
    showScreen("home");
  }
}

function openRent(index) {
  let item = items[index];

  let html = `
    <h3>${item.name}</h3>
    <p>$${item.price}/day</p>

    <label>Days:</label>
    <input id="days" type="number" value="1">

    <label>Payment Method:</label>
    <select id="payment">
      <option value="Card">Card</option>
      <option value="Cash">Cash</option>
    </select>

    <button onclick="submitRequest(${index})">Confirm Request</button>
    <button onclick="showScreen('home')">Back</button>
  `;

  document.getElementById("rentScreen").innerHTML = html;
  showScreen("rentScreen");
}

function submitRequest(index) {
  let days = document.getElementById("days").value;
  let payment = document.getElementById("payment").value;
  let item = items[index];

  let total = item.price * days;

  requests.push({
    item: item.name,
    days: days,
    payment: payment,
    total: total
  });

  alert("Request Sent! Total: $" + total);

  showScreen("requests");
}

function renderRequests() {
  let html = "";

  if(requests.length === 0){
    html = "<p>No requests yet</p>";
  } else {
    requests.forEach(r => {
      html += `
        <div class="card">
          <h4>${r.item}</h4>
          <p>Days: ${r.days}</p>
          <p>Payment: ${r.payment}</p>
          <p>Total: $${r.total}</p>
        </div>
      `;
    });
  }

  document.getElementById("requestList").innerHTML = html;
}

renderHome();
</script>

</body>
</html>
